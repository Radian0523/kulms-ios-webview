<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KULMS+ Demo</title>
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --kulms-color-danger: #e85555;
  --kulms-color-warning: #d7aa57;
  --kulms-color-success: #62b665;
  --kulms-color-other: #777777;

  --header-bg: #333435;
  --primary: #003a6b;
  --logo-blue: #003a6b;
  --favbar-bg: #f3f4f4;
  --sidebar-bg: #e3e4e5;
  --sidebar-section-bg: #f3f4f4;
  --border: #e3e4e5;
  --body-bg: #fff;
  --text: #333435;
  --text2: #777;
  --panel-bg: #cacaca;
  --panel-tab: #6483d3;
  --link: #003a6b;
  --syl-bg: #e8eef7;
  --syl-color: #4a6fa5;
  --card-bg: #fff;
  --row-bg: #f8f9fb;
  --row-hover: #eef0f5;
}

@media (prefers-color-scheme: dark) {
  :root {
    --header-bg: #1a1a1b;
    --favbar-bg: #2a2a2a;
    --sidebar-bg: #232323;
    --border: #3a3a3a;
    --body-bg: #1e1e1e;
    --text: #e0e0e0;
    --text2: #999;
    --panel-bg: #2a2a2a;
    --link: #8ab4f8;
    --syl-bg: #2a3548;
    --syl-color: #8ab4f8;
    --card-bg: #2a2a2a;
    --row-bg: #2a2a2a;
    --row-hover: #353535;
  }
}

html { font-size: 14px; }
body {
  font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", Roboto, sans-serif;
  background: var(--body-bg);
  color: var(--text);
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; -webkit-tap-highlight-color: transparent; }

/* ========== Demo Banner ========== */
.demo-banner {
  background: #fff3cd; color: #856404;
  text-align: center; padding: 5px 16px;
  font-size: 11px; font-weight: 600;
  position: sticky; top: 0; z-index: 600;
}
@media (prefers-color-scheme: dark) {
  .demo-banner { background: #3e2f00; color: #ffd54f; }
}

/* ========== LMS Header (Sakai-style with KU blue logo block) ========== */
.lms-header {
  background: var(--header-bg); color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 21px; z-index: 250;
  height: 56px;
  padding-right: 12px;
}
.lms-logo-block {
  background: var(--logo-blue);
  height: 100%;
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px;
  min-width: 130px;
}
.lms-logo { display: flex; align-items: center; gap: 5px; font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
.lms-logo .ku-mark {
  width: 24px; height: 24px; background: #fff; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 11px;
  color: var(--logo-blue);
}
.lms-header-mid { display: flex; align-items: center; gap: 6px; flex: 1; padding-left: 12px; min-width: 0; }
.lms-breadcrumb { font-size: 13px; opacity: 0.95; }
.lms-breadcrumb-sep { opacity: 0.5; margin: 0 6px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-icon {
  font-size: 16px; opacity: 0.85; cursor: pointer; position: relative;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 4px;
}
.header-icon:active { background: rgba(255,255,255,0.15); }
.header-icon .notif-red {
  position: absolute; top: 6px; right: 6px;
  width: 6px; height: 6px; background: #e53935; border-radius: 50%;
}
.kulms-hamburger-btn {
  border: none; background: transparent; color: #fff;
  font-size: 22px; cursor: pointer; padding: 4px 10px; line-height: 1;
  border-radius: 4px;
}
.kulms-hamburger-btn:active { background: rgba(255,255,255,0.15); }

/* Top alert banner (Sakai PA system style) */
.lms-alert-banner {
  background: #fff8e1; color: #5c4500;
  border-left: 4px solid #d7aa57;
  padding: 8px 32px 8px 12px;
  font-size: 12px; line-height: 1.4;
  display: flex; align-items: flex-start; gap: 8px;
  position: relative;
}
.lms-alert-banner .ico { font-size: 14px; flex-shrink: 0; }
.lms-alert-banner .close {
  position: absolute; top: 6px; right: 8px;
  background: none; border: none; cursor: pointer;
  color: #5c4500; font-size: 14px; padding: 2px 6px;
}
@media (prefers-color-scheme: dark) {
  .lms-alert-banner { background: #3d2f00; color: #ffd54f; }
  .lms-alert-banner .close { color: #ffd54f; }
}

/* ========== Top Favbar ========== */
.kulms-top-favbar {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 6px 10px;
  background: var(--favbar-bg);
  border-bottom: 1px solid rgba(0,0,0,0.08);
  --favitem-font: 12px;
  --favitem-py: 3px;
  --favitem-px: 8px;
}
.kulms-top-favbar.size-small { --favitem-font: 11px; --favitem-py: 2px; --favitem-px: 6px; }
.kulms-top-favbar.size-large { --favitem-font: 13px; --favitem-py: 5px; --favitem-px: 11px; }
.kulms-top-favbar.size-xlarge { --favitem-font: 15px; --favitem-py: 7px; --favitem-px: 14px; }

.kulms-top-favbar-item {
  position: relative;
  display: inline-flex; align-items: center;
  gap: 4px;
  padding: var(--favitem-py) var(--favitem-px);
  font-size: var(--favitem-font);
  border-left: 3px solid transparent;
  border-radius: 4px;
  background: rgba(0,0,0,0.04);
  white-space: nowrap;
  color: var(--text);
  cursor: pointer;
}
.kulms-top-favbar-item.cs-tab-danger { border-left-color: var(--kulms-color-danger); }
.kulms-top-favbar-item.cs-tab-warning { border-left-color: var(--kulms-color-warning); }
.kulms-top-favbar-item.cs-tab-success { border-left-color: var(--kulms-color-success); }
.kulms-top-favbar-item.cs-tab-other { border-left-color: var(--kulms-color-other); }

.kulms-top-favbar.color-background .kulms-top-favbar-item.cs-tab-danger { background: rgba(232,85,85,0.18); }
.kulms-top-favbar.color-background .kulms-top-favbar-item.cs-tab-warning { background: rgba(215,170,87,0.18); }
.kulms-top-favbar.color-background .kulms-top-favbar-item.cs-tab-success { background: rgba(98,182,101,0.18); }
.kulms-top-favbar.color-background .kulms-top-favbar-item.cs-tab-other { background: rgba(119,119,119,0.18); }

.kulms-top-favbar.color-bold .kulms-top-favbar-item { border-left-width: 5px; }
.kulms-top-favbar.color-bold .kulms-top-favbar-item.cs-tab-danger { background: rgba(232,85,85,0.10); }
.kulms-top-favbar.color-bold .kulms-top-favbar-item.cs-tab-warning { background: rgba(215,170,87,0.10); }
.kulms-top-favbar.color-bold .kulms-top-favbar-item.cs-tab-success { background: rgba(98,182,101,0.10); }
.kulms-top-favbar.color-bold .kulms-top-favbar-item.cs-tab-other { background: rgba(119,119,119,0.10); }

.kulms-top-favbar-item::after {
  content: ""; display: inline-block; width: 0; height: 0;
  margin-left: 3px;
  border-left: 4px solid transparent; border-right: 4px solid transparent;
  border-top: 5px solid currentColor; opacity: 0.55;
  transition: transform 0.15s;
}
.kulms-top-favbar-item.is-open::after { transform: rotate(180deg); opacity: 0.9; }
.kulms-top-favbar-item.is-open { background: rgba(0,0,0,0.1) !important; }

.kulms-now-badge {
  display: inline-block; padding: 0 5px; border-radius: 8px;
  font-size: 9px; font-weight: 700; color: #fff; line-height: 16px;
  background: #e53935; animation: kulms-now-pulse 2s ease-in-out infinite;
}
.kulms-now-badge.is-next { background: #1976d2; animation: none; }
@keyframes kulms-now-pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.kulms-notification-badge {
  width: 8px; height: 8px; background: #e85555; border-radius: 50%;
}

.kulms-favbar-dropdown {
  position: fixed; z-index: 950;
  background: var(--card-bg);
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  padding: 6px 0; min-width: 200px; max-width: 300px;
  max-height: calc(100vh - 100px); overflow-y: auto;
  font-size: 13px;
}
.kulms-favbar-dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; margin: 2px 6px; border-radius: 6px;
  color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.kulms-favbar-dropdown-item:active { background: #e8f0fe; color: #1a73e8; }
.kulms-favbar-dropdown-item .icon { width: 16px; text-align: center; opacity: 0.75; flex-shrink: 0; }
@media (prefers-color-scheme: dark) {
  .kulms-favbar-dropdown { border-color: #3d4147; }
  .kulms-favbar-dropdown-item:active { background: rgba(138,180,248,0.15); color: #8ab4f8; }
}

/* ========== Sidebar (Sakai pin list) ========== */
.sidebar-toggle-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px; background: var(--sidebar-section-bg);
  border-bottom: 1px solid var(--border);
  font-size: 14px; font-weight: 700; color: var(--text); cursor: pointer;
}
.sidebar-toggle-btn .arrow { font-size: 9px; transition: transform 0.2s; opacity: 0.7; }
.sidebar-toggle-btn .arrow.open { transform: rotate(90deg); }
.sidebar-toggle-btn .grid-ico { font-size: 13px; opacity: 0.6; margin-left: auto; }

.lms-sidebar {
  display: none; background: var(--sidebar-bg);
  border-bottom: 1px solid var(--border); padding: 0;
}
.lms-sidebar.open { display: block; }

.sidebar-pin-heading {
  background: var(--sidebar-section-bg);
  font-size: 14px; font-weight: 700; color: var(--text);
  padding: 12px 14px 8px;
  border-top: 1px solid var(--border);
}
@media (prefers-color-scheme: dark) {
  .sidebar-pin-heading { background: #2a2a2a; }
}

.sb-home-section {
  background: var(--sidebar-section-bg);
  padding: 6px 0;
}
@media (prefers-color-scheme: dark) {
  .sb-home-section { background: #2a2a2a; }
}
.sb-home-row {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; font-size: 14px; font-weight: 600; color: var(--text);
  cursor: pointer;
}
.sb-home-arrow { font-size: 11px; opacity: 0.7; }
.sb-home-tool {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px 8px 30px; font-size: 13px; color: var(--text);
  cursor: pointer;
}
.sb-home-tool .ico { width: 16px; text-align: center; opacity: 0.7; font-size: 13px; }
.sb-home-tool:active { background: rgba(0,0,0,0.04); }
.sb-home-tool.sb-home-active {
  background: rgba(0, 58, 107, 0.08);
  border-left: 4px solid var(--logo-blue);
  padding-left: 26px; font-weight: 600;
}
.sb-home-other {
  font-size: 12px; color: var(--text2);
  padding: 6px 14px 4px 30px; cursor: pointer;
}

.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; font-size: 14px; color: var(--text);
  border-left: 4px solid #888; cursor: pointer;
  position: relative;
  background: rgba(0,0,0,0.02);
}
.sb-item:active { background: rgba(0,0,0,0.06); }
.sb-item.cs-tab-danger { border-left-color: var(--kulms-color-danger); }
.sb-item.cs-tab-warning { border-left-color: var(--kulms-color-warning); }
.sb-item.cs-tab-success { border-left-color: var(--kulms-color-success); }
.sb-item.cs-tab-other { border-left-color: var(--kulms-color-other); }

.sidebar-color-background .sb-item.cs-tab-danger { background: rgba(232,85,85,0.18); }
.sidebar-color-background .sb-item.cs-tab-warning { background: rgba(215,170,87,0.18); }
.sidebar-color-background .sb-item.cs-tab-success { background: rgba(98,182,101,0.18); }
.sidebar-color-background .sb-item.cs-tab-other { background: rgba(119,119,119,0.18); }

.sidebar-color-bold .sb-item { border-left-width: 6px; }
.sidebar-color-bold .sb-item.cs-tab-danger { background: rgba(232,85,85,0.10); }
.sidebar-color-bold .sb-item.cs-tab-warning { background: rgba(215,170,87,0.10); }
.sidebar-color-bold .sb-item.cs-tab-success { background: rgba(98,182,101,0.10); }
.sidebar-color-bold .sb-item.cs-tab-other { background: rgba(119,119,119,0.10); }

.sb-item .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-item .pin-icon { font-size: 11px; color: var(--text2); }
.sb-item .notif-dot {
  width: 7px; height: 7px; background: var(--kulms-color-danger); border-radius: 50%;
}

.sb-tools {
  display: none; padding: 4px 0; background: rgba(0,0,0,0.03);
}
.sb-item.expanded + .sb-tools { display: block; }
.sb-tool {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px 6px 32px; font-size: 12px; color: var(--text2);
}
.sb-tool .icon { width: 14px; text-align: center; opacity: 0.7; }
.sb-tool:active { background: rgba(0,0,0,0.05); }

/* ========== Main Page (Sakai portlet style) ========== */
.lms-page { padding: 0 0 80px; }
.lms-portlet {
  margin: 12px;
  background: var(--card-bg);
  border-radius: 0;
  border-bottom: 1px solid var(--border);
}
.lms-portlet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 4px 8px;
  border-bottom: 1px solid var(--border);
}
.lms-portlet-title {
  font-size: 15px; font-weight: 600; color: var(--text);
}
.lms-portlet-link {
  font-size: 12px; color: var(--link); text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
}
.lms-portlet-link::before { content: "🔗"; font-size: 11px; opacity: 0.7; }
.lms-portlet-body { padding: 8px 4px 12px; }
.lms-section-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  padding: 12px 12px 6px; border-bottom: 1px solid var(--border); margin: 0 0 8px;
}
.lms-card {
  background: var(--card-bg); border-radius: 6px;
  padding: 10px 12px; margin: 0 12px 8px; font-size: 13px; line-height: 1.5;
  border: 1px solid var(--border);
}
.lms-card-title { font-weight: 600; margin-bottom: 4px; color: var(--text); font-size: 14px; }
.lms-card-meta { font-size: 11px; color: var(--text2); margin-top: 6px; }
.lms-card-link {
  font-size: 13px; color: var(--link); text-decoration: none;
  display: block; padding: 4px 0;
}

/* ========== Course tool sub-nav ========== */
.tool-subnav {
  display: flex; flex-wrap: wrap; gap: 0;
  background: var(--sidebar-section-bg);
  border-bottom: 1px solid var(--border);
  padding: 0;
}
.tool-subnav-item {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px; font-size: 13px;
  color: var(--text); cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
}
.tool-subnav-item.active {
  color: var(--logo-blue); font-weight: 600;
  border-bottom-color: var(--logo-blue);
  background: var(--card-bg);
}
.tool-subnav-item .ico { font-size: 13px; opacity: 0.7; }
@media (prefers-color-scheme: dark) {
  .tool-subnav-item.active { color: #8ab4f8; border-bottom-color: #8ab4f8; }
}

.lms-back-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: var(--sidebar-section-bg);
  border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--text2); cursor: pointer;
}
.lms-back-bar:active { background: var(--row-hover); }
.lms-back-bar .arrow { font-size: 14px; }

/* ========== Tool pages ========== */
.tool-page-title {
  font-size: 18px; font-weight: 700;
  padding: 16px 14px 4px; color: var(--text);
}
.tool-page-meta {
  font-size: 12px; color: var(--text2);
  padding: 0 14px 12px; border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

/* Resources page table */
.res-table {
  margin: 0 12px 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.res-table-header {
  display: grid;
  grid-template-columns: 28px 1fr 90px;
  gap: 6px;
  padding: 10px 12px;
  background: var(--sidebar-section-bg);
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.res-table-row {
  display: grid;
  grid-template-columns: 28px 1fr 90px;
  gap: 6px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; align-items: center;
}
.res-table-row:last-child { border-bottom: none; }
.res-table-row.folder { cursor: pointer; }
.res-table-row .ico { font-size: 16px; }
.res-table-row .name a { color: var(--link); }
.res-table-row .meta { font-size: 11px; color: var(--text2); text-align: right; }
.res-table-row.indent-1 { padding-left: 32px; }
.res-table-row.indent-2 { padding-left: 52px; }
.res-table-row.collapsed-children { display: none; }

/* Assignments table */
.assign-list {
  margin: 0 12px 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.assign-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; gap: 12px;
}
.assign-row:last-child { border-bottom: none; }
.assign-row-name { font-weight: 600; color: var(--link); flex: 1; min-width: 0; }
.assign-row-meta { font-size: 11px; color: var(--text2); text-align: right; }

/* Forum threads */
.forum-list {
  margin: 0 12px 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
}
.forum-row {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 12px; border-bottom: 1px solid var(--border);
}
.forum-row:last-child { border-bottom: none; }
.forum-row .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--logo-blue); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.forum-row .body { flex: 1; min-width: 0; }
.forum-row .title { font-weight: 600; color: var(--link); font-size: 13px; }
.forum-row .meta { font-size: 11px; color: var(--text2); margin-top: 4px; }
.forum-row .preview { font-size: 12px; color: var(--text); margin-top: 4px; }
.forum-row .count {
  font-size: 11px; color: var(--text2);
  background: var(--sidebar-section-bg);
  padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
}

/* Gradebook */
.grade-table {
  margin: 0 12px 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.grade-row {
  display: grid;
  grid-template-columns: 1fr 70px 70px;
  gap: 8px; padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; align-items: center;
}
.grade-row.header {
  background: var(--sidebar-section-bg);
  font-size: 11px; font-weight: 700; color: var(--text2);
  text-transform: uppercase;
}
.grade-row:last-child { border-bottom: none; }
.grade-row .grade { font-weight: 700; text-align: center; }
.grade-row .score { font-weight: 600; text-align: center; color: var(--text); }
.grade-row .grade.A { color: #2e7d32; }
.grade-row .grade.B { color: #1565c0; }
.grade-row .grade.C { color: #f57c00; }

/* Syllabus */
.syllabus-card {
  margin: 0 12px 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
}
.syllabus-row {
  display: flex; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.syllabus-row:last-child { border-bottom: none; }
.syllabus-row .label { width: 80px; font-weight: 600; color: var(--text2); flex-shrink: 0; }
.syllabus-row .val { flex: 1; min-width: 0; }
.syllabus-section {
  margin-top: 12px;
}
.syllabus-section-title {
  font-size: 13px; font-weight: 700; color: var(--text);
  padding: 8px 0 4px;
}
.syllabus-section-body { font-size: 13px; line-height: 1.6; }

/* Resources tree (mock) */
.res-tree { background: var(--row-bg); border-radius: 6px; padding: 8px; }
.res-row {

    var c = COURSES.filter(function (x) { return x.id === a.courseId; })[0];
    return c ? courseNameFor(c) : "";
  }

  // ============== Utilities ==============
  function escHtml(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
  }); }

  function getUrgencyClass(deadline) {
    if (!deadline) return "urgency-other";
    var diff = deadline - Date.now();
    if (diff < 0) return "urgency-overdue";
    if (diff < state.settings.dangerHours * HOUR) return "urgency-danger";
    if (diff < state.settings.warningDays * DAY) return "urgency-warning";
    if (diff < state.settings.successDays * DAY) return "urgency-success";
    return "urgency-other";
  }
  function urgencyToCsTab(u) {
    if (u === "urgency-overdue" || u === "urgency-danger") return "cs-tab-danger";
    if (u === "urgency-warning") return "cs-tab-warning";
    if (u === "urgency-success") return "cs-tab-success";
    return "cs-tab-other";
  }

  function pad(n) { return String(n).padStart(2, "0"); }
  function formatDeadline(ts) {
    if (!ts) return "-";
    var d = new Date(ts);
    return d.getFullYear() + "/" + pad(d.getMonth() + 1) + "/" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }
  function formatRemaining(deadline, closeTime) {
    if (!deadline) return "";
    var diff = deadline - Date.now();
    if (diff < 0) {
      if (closeTime && closeTime > Date.now()) return t("resubmitPeriod");
      return t("expired");
    }
    var d = Math.floor(diff / DAY);
    var h = Math.floor((diff % DAY) / HOUR);
    var m = Math.floor((diff % HOUR) / MIN);
    if (d > 0) return t("remainDaysHoursMins", [String(d), String(h), String(m)]);
    if (h > 0) return t("remainHoursMins", [String(h), String(m)]);
    return t("remainMins", [String(m)]);
  }
  function isSubmitted(status) {
    if (!status) return false;
    var s = status.toLowerCase();
    return s.indexOf("提出済") >= 0 || s.indexOf("submitted") >= 0 || s.indexOf("評定済") >= 0 || s.indexOf("graded") >= 0;
  }
  function getCheckedKey(a) { return a.entityId || (a.courseId + ":" + a.name); }
  function isChecked(a) {
    var v = state.checked[getCheckedKey(a)];
    return v && v !== "active";
  }
  function isExplicitlyActive(a) { return state.checked[getCheckedKey(a)] === "active"; }
  function isDismissed(a) { return !!state.dismissed[getCheckedKey(a)]; }

  function showToast(msg) {
    var prev = document.querySelector(".kulms-toast");
    if (prev) prev.remove();
    var el = document.createElement("div");
    el.className = "kulms-toast";
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function () { el.remove(); }, 2500);
  }

  // ============== Rendering: Top Favbar ==============
  function getCurrentPeriodInfo() {
    // Mock: pretend it's Monday period 1 if it's "now"; pick day-of-week to match real time
    var now = new Date();
    var dow = now.getDay(); // 0=Sun, 1=Mon, ...
    var hh = now.getHours();
    // Fall back to mock: NOW = Mon period 1 if dow is weekend
    if (dow === 0 || dow === 6) return { nowDay: 1, nowPeriod: 1, nextDay: 1, nextPeriod: 2 };
    // Map hour to period (rough): 8:45-10:15=1, 10:30-12:00=2, 13:00-14:30=3, 14:45-16:15=4, 16:30-18:00=5
    var periodMap = [[8,1],[10,2],[13,3],[14,4],[16,5]];
    var nowP = 0;
    for (var i = periodMap.length - 1; i >= 0; i--) {
      if (hh >= periodMap[i][0]) { nowP = periodMap[i][1]; break; }
    }
    if (nowP === 0) return { nowDay: 0, nowPeriod: 0, nextDay: dow, nextPeriod: 1 };
    return { nowDay: dow, nowPeriod: nowP, nextDay: dow, nextPeriod: nowP + 1 };
  }

      pinned.sort(function (a, b) { return (a.day - b.day) || (a.period - b.period); });
    }
    var info = state.settings.currentPeriodHighlight ? getCurrentPeriodInfo() : null;
    pinned.forEach(function (c) {
      var item = document.createElement("span");
      item.className = "kulms-top-favbar-item " + getCourseUrgencyClass(c);

      nameSpan.className = "kulms-top-favbar-name";
      nameSpan.textContent = formatCourseName(c);
      item.appendChild(nameSpan);

      if (info) {
        if (info.nowDay === c.day && info.nowPeriod === c.period) {
          var nb = document.createElement("span");
          nb.className = "kulms-now-badge";
          nb.textContent = "NOW";
          item.appendChild(nb);
        } else if (info.nextDay === c.day && info.nextPeriod === c.period) {
          var xb = document.createElement("span");

          xb.textContent = "NEXT";

      item.addEventListener("click", function (e) {

  var openDropdown = null;
  function toggleFavbarDropdown(item, course) {
    closeFavbarDropdown();
    if (item.classList.contains("is-open")) {
      item.classList.remove("is-open"); return;
    }
    item.classList.add("is-open");
    var dd = document.createElement("div");
    dd.className = "kulms-favbar-dropdown";
    TOOLS.forEach(function (tool) {
      var a = document.createElement("a");
      a.className = "kulms-favbar-dropdown-item";
      a.innerHTML = '<span class="icon">' + escHtml(tool.icon) + '</span><span class="label">' + escHtml(detectLang() === "ja" ? tool.ja : tool.en) + '</span>';
      a.addEventListener("click", function (ev) {
        ev.stopPropagation();
        ev.preventDefault();
        closeFavbarDropdown();
        navigateTo({ type: "tool", courseId: course.id, tool: tool.id });
      });
      dd.appendChild(a);
    });
    document.body.appendChild(dd);
    var rect = item.getBoundingClientRect();
    dd.style.top = (rect.bottom + 4) + "px";
    dd.style.left = Math.min(rect.left, window.innerWidth - 260) + "px";
    openDropdown = { dd: dd, item: item };
  }
  function closeFavbarDropdown() {
    if (!openDropdown) return;
    if (openDropdown.dd) openDropdown.dd.remove();
    if (openDropdown.item) openDropdown.item.classList.remove("is-open");
    openDropdown = null;
  }
  document.addEventListener("click", function () { closeFavbarDropdown(); });

  function getCourseUrgencyClass(c) {
    var rel = ASSIGNMENTS.filter(function (a) { return a.courseId === c.id && !isChecked(a) && !isSubmitted(a.status) && !isDismissed(a) && a.deadline; });
    if (rel.length === 0) return "cs-tab-other";
    rel.sort(function (a, b) { return a.deadline - b.deadline; });
    return urgencyToCsTab(getUrgencyClass(rel[0].deadline));
  }

  function formatCourseName(c) {
    var nm = detectLang() === "ja" ? c.name : c.nameEn;
    if (state.settings.courseNameCleanup) {
      return c.short + " " + nm;
    }
    return "[2026前期" + ["日","月","火","水","木","金","土"][c.day] + c.period + "] " + nm;
  }

  // ============== KULMS+ Panel ==============
  var panelEl = document.getElementById("kulms-assign-panel");
  var contentEl = document.getElementById("panelContent");
  var cacheInfoEl = document.getElementById("cacheInfo");
  var openTime = NOW;

  function buildTabBar() {
    var tabBar = document.getElementById("tabBar");
    tabBar.innerHTML = "";
    var tabs = [
      { id: "assignments", label: t("tabAssignments") },
      { id: "textbooks",   label: t("tabTextbooks") },
      { id: "settings",    label: t("tabSettings") }
    ];
    if (!state.settings.textbooks) tabs.splice(1, 1);
    tabs.forEach(function (tt) {
      var label = document.createElement("label");
      label.className = "kulms-panel-tab" + (state.activeTab === tt.id ? " active" : "");
      label.textContent = tt.label;
      label.addEventListener("click", function () {
        state.activeTab = tt.id;
        saveState();
        buildTabBar();
        renderActiveView();
      });
      tabBar.appendChild(label);
    });
    if (!state.settings.textbooks && state.activeTab === "textbooks") {
      state.activeTab = "assignments";
    }
  }

  function openPanel() {
    panelEl.classList.add("open");
    document.getElementById("panelOverlay").classList.add("open");
    state.panelOpen = true;
    saveState();
    if (state.settings.panelPush) {
      document.body.style.transition = "margin-right 0.3s ease";
      document.body.style.marginRight = "min(320px, 90vw)";
    }
    openTime = Date.now();
    renderActiveView();
  }
  function closePanel() {
    panelEl.classList.remove("open");
    document.getElementById("panelOverlay").classList.remove("open");
    state.panelOpen = false;
    saveState();
    document.body.style.marginRight = "";
  }
  function togglePanel() { panelEl.classList.contains("open") ? closePanel() : openPanel(); }

  function renderActiveView() {
    contentEl.innerHTML = "";
    cacheInfoEl.textContent = "";
    if (state.activeTab === "assignments") renderAssignments();
    else if (state.activeTab === "textbooks") renderTextbooks();
    else renderSettings();
  }

  // -------- Assignments --------
  function renderAssignments() {
    var ago = Math.floor((Date.now() - openTime) / MIN);
    cacheInfoEl.textContent = ago < 1 ? t("lastUpdatedNow") : t("lastUpdatedMins", [String(ago)]);

    var notDismissed = ASSIGNMENTS.filter(function (a) { return !isDismissed(a); });
    var autoComplete = state.settings.autoComplete;
    var now = Date.now();

    var visible = notDismissed.filter(function (a) {
      if (isExplicitlyActive(a)) return true;
      var auto = autoComplete && isSubmitted(a.status);
      var closed = a.closeTime && a.closeTime < now;
      return !(auto && closed);
    });

    var completed = [], active = [];
    visible.forEach(function (a) {
      if (isExplicitlyActive(a)) {
        a._resubmitActive = true;
        active.push(a);
      } else if (isChecked(a) || (autoComplete && isSubmitted(a.status))) {
        a._completed = true;
        completed.push(a);
      } else {
        active.push(a);
      }
    });
    active.sort(function (a, b) {
      if (a.deadline && b.deadline) return a.deadline - b.deadline;
      if (a.deadline) return -1;
      if (b.deadline) return 1;
      return 0;
    });

    var groups = { overdue: [], danger: [], warning: [], success: [], other: [] };
    active.forEach(function (a) {
      var u = getUrgencyClass(a.deadline);
      var key = u.replace("urgency-", "");
      (groups[key] || groups.other).push(a);
    });

    // Integrate deadline memos
    if (state.settings.memos) {
      state.memos.forEach(function (memo) {
        if (!memo.deadline) return;
        var memoItem = {
          courseName: memo.courseName || "",
          courseId: memo.courseId || "",
          name: memo.text,
          deadline: memo.deadline,
          closeTime: memo.deadline,
          entityId: "memo-" + memo.id,
          type: "memo",
          _memoId: memo.id
        };
        if (isDismissed(memoItem)) return;
        if (isChecked(memoItem)) { memoItem._completed = true; completed.push(memoItem); return; }
        var u = getUrgencyClass(memo.deadline).replace("urgency-", "");
        (groups[u] || groups.other).push(memoItem);
      });
      Object.keys(groups).forEach(function (k) {
        groups[k].sort(function (a, b) { return (a.deadline||0) - (b.deadline||0); });
      });
    }

    var s = state.settings;
    if (groups.overdue.length) contentEl.appendChild(createSection(t("sectionOverdue"), groups.overdue, "overdue", false));
    if (groups.danger.length) contentEl.appendChild(createSection(t("sectionDanger", [String(s.dangerHours)]), groups.danger, "danger", false));
    if (groups.warning.length) contentEl.appendChild(createSection(t("sectionWarning", [String(s.warningDays)]), groups.warning, "warning", false));
    if (groups.success.length) contentEl.appendChild(createSection(t("sectionSuccess", [String(s.successDays)]), groups.success, "success", false));
    if (groups.other.length) contentEl.appendChild(createSection(t("sectionOther"), groups.other, "other", false));

    // plain memos (no deadline)
    if (state.settings.memos) renderPlainMemos();

    if (completed.length) {
      completed.sort(function (a, b) { return (b.deadline||0) - (a.deadline||0); });
      contentEl.appendChild(createSection(t("sectionCompleted"), completed, "checked", true));
    }

    renderDeletedSection();
    appendMemoButton();

    if (active.length === 0 && completed.length === 0 && state.memos.length === 0) {
      contentEl.innerHTML = "";
      var empty = document.createElement("div");
      empty.className = "kulms-assign-empty";
      empty.textContent = t("noAssignments");
      contentEl.appendChild(empty);
      appendMemoButton();
    }
  }

  function createSection(label, items, type, defaultCollapsed) {
    var collapsed = type in state.sectionCollapsed ? state.sectionCollapsed[type] : defaultCollapsed;
    var sec = document.createElement("div");
    sec.className = "kulms-assign-section";
    var hd = document.createElement("div");
    hd.className = "kulms-assign-section-header kulms-section-" + type;
    var tg = document.createElement("span");
    tg.className = "kulms-assign-section-toggle" + (collapsed ? " collapsed" : "");
    tg.textContent = "▼";
    var tl = document.createElement("span"); tl.textContent = label;
    var ct = document.createElement("span"); ct.className = "kulms-assign-section-count"; ct.textContent = "(" + items.length + ")";
    hd.appendChild(tg); hd.appendChild(tl); hd.appendChild(ct);
    var ic = document.createElement("div");
    ic.className = "kulms-assign-section-items" + (collapsed ? " collapsed" : "");
    items.forEach(function (a) { ic.appendChild(createCard(a)); });
    hd.addEventListener("click", function () {
      tg.classList.toggle("collapsed");
      ic.classList.toggle("collapsed");
      state.sectionCollapsed[type] = tg.classList.contains("collapsed");
      saveState();
    });
    sec.appendChild(hd); sec.appendChild(ic);
    return sec;
  }

  function createCard(a) {
    var u = getUrgencyClass(a.deadline);
    var card = document.createElement("div");
    card.className = "kulms-assign-card " + u;
    if (a._completed) card.classList.add("kulms-checked");
    if (a.type === "memo") card.classList.add("kulms-memo-card");

    if (a.type === "memo") {
      var mb = document.createElement("span"); mb.className = "kulms-badge-memo"; mb.textContent = t("memoLabel");
      card.appendChild(mb);
      var mt = document.createElement("div"); mt.className = "kulms-memo-text"; mt.textContent = a.name;
      card.appendChild(mt);
      var meta = document.createElement("div"); meta.className = "kulms-assign-card-meta";
      var dEl = document.createElement("span"); dEl.textContent = formatDeadline(a.deadline); meta.appendChild(dEl);
      var rem = formatRemaining(a.deadline, a.closeTime);
      if (rem) {
        var rEl = document.createElement("span"); rEl.className = "kulms-time-remain";
        if (rem === t("expired")) rEl.classList.add("overdue");
        rEl.textContent = rem;
        meta.appendChild(rEl);
      }
      card.appendChild(meta);
      var del = document.createElement("button");
      del.className = "kulms-memo-delete"; del.innerHTML = "&times;";
      del.addEventListener("click", function (e) {
        e.stopPropagation();
        if (confirm(t("deleteConfirm"))) {
          state.memos = state.memos.filter(function (m) { return m.id !== a._memoId; });
          saveState();
          renderActiveView();
        }
      });
      card.appendChild(del);
      return card;
    }

    var cb = document.createElement("div");
    cb.className = "kulms-checkbox" + ((isChecked(a) && !isExplicitlyActive(a)) ? " checked" : "");
    cb.addEventListener("click", function (e) {
      e.stopPropagation();
      var key = getCheckedKey(a);
      if (state.checked[key] && state.checked[key] !== "active") {
        delete state.checked[key];
      } else {
        state.checked[key] = Date.now();
      }
      saveState();
      renderActiveView();
    });
    card.appendChild(cb);

    var body = document.createElement("div");
    body.className = "kulms-assign-card-body";

    var bRow = document.createElement("div");
    bRow.className = "kulms-badge-row";
    var pill = document.createElement("span");
    pill.className = "kulms-course-pill " + u;
    pill.textContent = a.courseName || assignCourseName(a);
    bRow.appendChild(pill);
    if (a.type === "quiz") {
      var qb = document.createElement("span"); qb.className = "kulms-badge-quiz"; qb.textContent = t("badgeQuiz");
      bRow.appendChild(qb);
    }
    if (isSubmitted(a.status) || a.status) {
      var sb = document.createElement("span");

  // -------- Memo modal --------
  var memoModal = document.getElementById("memoModal");
  function fillSelect(sel, start, end, pad2) {
    sel.innerHTML = "";
    for (var i = start; i <= end; i++) {

  function openMemoModal() {
    document.getElementById("memoModalTitle").textContent = t("memoAdd");
    document.getElementById("memoInput").placeholder = t("memoPlaceholder");
    document.getElementById("memoCancelBtn").textContent = t("memoCancel");
    document.getElementById("memoSaveBtn").textContent = t("memoSave");
    var d = new Date(Date.now() + DAY);
    var ySel = document.getElementById("memoYear");
    var mSel = document.getElementById("memoMonth");
    var dSel = document.getElementById("memoDay");
    var hSel = document.getElementById("memoHour");
    var nSel = document.getElementById("memoMin");
    fillSelect(ySel, d.getFullYear(), d.getFullYear() + 2);
    fillSelect(mSel, 1, 12, true);
    fillSelect(dSel, 1, 31, true);
    fillSelect(hSel, 0, 23, true);
    fillSelect(nSel, 0, 59, true);
    ySel.value = d.getFullYear(); mSel.value = d.getMonth() + 1; dSel.value = d.getDate();
    hSel.value = 23; nSel.value = 59;

    var optEmpty = document.createElement("option"); optEmpty.value = ""; optEmpty.textContent = t("memoCourseSelect");
    cs.appendChild(optEmpty);

  document.getElementById("memoModalClose").addEventListener("click", closeMemoModal);
  document.getElementById("memoCancelBtn").addEventListener("click", closeMemoModal);

    var ySel = document.getElementById("memoYear");
    var mSel = document.getElementById("memoMonth");
    var dSel = document.getElementById("memoDay");
    var hSel = document.getElementById("memoHour");
    var nSel = document.getElementById("memoMin");

    });

    view.appendChild(btnRow);

    // Feedback link
    var fb = document.createElement("a"); fb.className = "kulms-feedback-link"; fb.textContent = t("feedbackLink"); fb.href = "#";
    fb.addEventListener("click", function (e) { e.preventDefault(); showToast(t("feedbackLink")); });
    view.appendChild(fb);

    // Footer
    var ft = document.createElement("div"); ft.className = "kulms-settings-footer"; ft.textContent = t("settingsFooter");
    view.appendChild(ft);

    contentEl.appendChild(view);
  }

  // ============== Main page renderer (home or tool view) ==============
  function renderMainPage() {
    var page = document.getElementById("lmsPage");
    if (!page) return;
    page.innerHTML = "";
    var v = state.currentView || { type: "home" };
    if (v.type === "home") {
      renderHomePage(page);
    } else if (v.type === "tool") {
      renderToolPage(page, v.courseId, v.tool);
    }
  }

  function renderHomePage(page) {
    var ja = detectLang() === "ja";

    // Today's messages portlet
    var p1 = portlet(ja ? "今日のメッセージ" : "Today's Messages");
    p1.body.appendChild(card({
      title: ja ? "【お知らせ】第一回MATLAB講習会(オンライン開催) (4/28)"
                : "[Notice] 1st MATLAB Workshop (Online, 4/28)",
      desc: ja ? "MATLAB未経験〜初心者向け。データ取込・可視化・基本解析を実習形式で。"
               : "For MATLAB beginners. Data import, visualization, and basic analysis hands-on.",
      meta: "2026.4.15"
    }));
    p1.body.appendChild(card({
      title: ja ? "【お知らせ】Turnitin Feedback Studio講習会 (4/27)"
                : "[Notice] Turnitin Feedback Studio Workshop (4/27)",
      desc: ja ? "KULMSを利用したTurnitin類似性チェックツールの使い方。"
               : "How to use Turnitin similarity-checking tool on KULMS.",
      meta: "2026.4.14"
    }));
    page.appendChild(p1.root);

    // Recent announcements portlet (links to course tool pages)
    var p2 = portlet(ja ? "最近のお知らせ" : "Recent Announcements");
    [
      { courseId: "c-mon3", titleJa: "レポート#1 締切: 4/20 22:00", titleEn: "Report #1 deadline: Apr 20 22:00", meta: "2026.4.18", tool: "assignments" },
      { courseId: "c-mon1", titleJa: "第4回講義資料をアップロードしました", titleEn: "Week 4 lecture materials uploaded", meta: "2026.4.16", tool: "resources" },
      { courseId: "c-tue2", titleJa: "プログラミング演習#3を公開しました", titleEn: "Programming Exercise #3 released", meta: "2026.4.15", tool: "assignments" }
    ].forEach(function (a) {
      var c = getCourseById(a.courseId);
      var ann = document.createElement("div");
      ann.className = "lms-card";
      ann.style.cursor = "pointer";
      ann.innerHTML = '<div class="lms-card-title">' + escHtml(courseNameFor(c)) + '</div>'
        + '<div>' + escHtml(ja ? a.titleJa : a.titleEn) + '</div>'
        + '<div class="lms-card-meta">' + a.meta + '</div>';
      ann.addEventListener("click", function () {
        navigateTo({ type: "tool", courseId: a.courseId, tool: a.tool });
      });
      p2.body.appendChild(ann);
    });
    page.appendChild(p2.root);
  }

  function portlet(title) {
    var root = document.createElement("div");
    root.className = "lms-portlet";
    var hd = document.createElement("div");
    hd.className = "lms-portlet-header";
    hd.innerHTML = '<span class="lms-portlet-title">' + escHtml(title) + '</span>'
      + '<a href="#" class="lms-portlet-link">' + (detectLang() === "ja" ? "リンク" : "Link") + '</a>';
    hd.querySelector("a").addEventListener("click", function (e) { e.preventDefault(); });
    var body = document.createElement("div");
    body.className = "lms-portlet-body";
    root.appendChild(hd);
    root.appendChild(body);
    return { root: root, body: body };
  }

  function card(d) {
    var el = document.createElement("div");
    el.className = "lms-card";
    el.innerHTML = '<div class="lms-card-title">' + escHtml(d.title) + '</div>'
      + '<div>' + escHtml(d.desc || "") + '</div>'
      + (d.meta ? ('<div class="lms-card-meta">' + escHtml(d.meta) + '</div>') : '');
    return el;
  }

  function renderToolPage(page, courseId, tool) {
    var c = getCourseById(courseId);
    if (!c) { state.currentView = { type: "home" }; renderHomePage(page); return; }
    var ja = detectLang() === "ja";

    // Back-to-home bar
    var back = document.createElement("div");
    back.className = "lms-back-bar";
    back.innerHTML = '<span class="arrow">←</span><span>'
      + (ja ? "ホームに戻る" : "Back to Home")
      + '</span>';
    back.addEventListener("click", function () { navigateTo({ type: "home" }); });
    page.appendChild(back);

    // Course title
    var title = document.createElement("div");
    title.className = "tool-page-title";
    title.textContent = courseNameFor(c);
    page.appendChild(title);
    var meta = document.createElement("div");
    meta.className = "tool-page-meta";
    meta.textContent = ja
      ? "2026年度 前期 / " + ["日","月","火","水","木","金","土"][c.day] + "曜" + c.period + "限"
      : "AY 2026 Spring / " + ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][c.day] + " " + c.period;
    page.appendChild(meta);

    // Tool sub-nav
    var nav = document.createElement("div");
    nav.className = "tool-subnav";
    TOOLS.forEach(function (tt) {
      var item = document.createElement("div");
      item.className = "tool-subnav-item" + (tt.id === tool ? " active" : "");
      item.innerHTML = '<span class="ico">' + escHtml(tt.icon) + '</span><span>'
        + escHtml(ja ? tt.ja : tt.en) + '</span>';
      item.addEventListener("click", function () {
        navigateTo({ type: "tool", courseId: courseId, tool: tt.id });
      });
      nav.appendChild(item);
    });
    page.appendChild(nav);

    // Tool body
    var body = document.createElement("div");
    body.style.padding = "8px 0 24px";
    page.appendChild(body);

    if (tool === "overview") renderToolOverview(body, c);
    else if (tool === "resources") renderToolResources(body, c);
    else if (tool === "assignments") renderToolAssignments(body, c);
    else if (tool === "forums") renderToolForums(body, c);
    else if (tool === "gradebook") renderToolGradebook(body, c);
    else if (tool === "syllabus") renderToolSyllabus(body, c);
  }

  function renderToolOverview(body, c) {
    var ja = detectLang() === "ja";
    var p1 = portlet(ja ? "授業紹介" : "Course Description");
    var d = document.createElement("div");
    d.className = "lms-card";
    d.innerHTML = '<div>' + escHtml(c.short + " " + (ja ? c.name : c.nameEn)) + (ja ? "の授業ホームです。お知らせ、課題、教材をここで確認できます。" : " — course home. Check announcements, assignments, and materials here.") + '</div>';
    p1.body.appendChild(d);
    body.appendChild(p1.root);

    var p2 = portlet(ja ? "お知らせ" : "Announcements");
    var ann1 = card({
      title: ja ? "第" + (Math.floor(Math.random()*3)+3) + "回講義資料を公開" : "Lecture materials released",
      desc: ja ? "次回講義の資料を授業資料からダウンロードしてください。" : "Please download the materials for the next class.",
      meta: "2026.4.18"
    });
    var ann2 = card({
      title: ja ? "課題提出締切のお知らせ" : "Upcoming assignment deadline",
      desc: ja ? "今週末締切の課題があります。" : "An assignment is due this weekend.",
      meta: "2026.4.16"
    });
    p2.body.appendChild(ann1);
    p2.body.appendChild(ann2);
    body.appendChild(p2.root);
  }

  function renderToolResources(body, c) {
    var ja = detectLang() === "ja";
    var t = document.createElement("div");
    t.className = "res-table";
    var hd = document.createElement("div");
    hd.className = "res-table-header";
    hd.innerHTML = '<span></span><span>' + (ja ? "名前" : "Name") + '</span><span style="text-align:right">' + (ja ? "更新日" : "Modified") + '</span>';
    t.appendChild(hd);
    var items = [
      { type: "folder", name: ja ? "講義資料" : "Lectures", date: "2026.4.18", depth: 0, children: [
        { type: "file", name: "Week01_スライド.pdf", date: "2026.4.10", depth: 1 },
        { type: "file", name: "Week02_スライド.pdf", date: "2026.4.17", depth: 1 },
        { type: "folder", name: ja ? "補足資料" : "Sub-materials", date: "2026.4.16", depth: 1, children: [
          { type: "file", name: "ノート.pdf", date: "2026.4.15", depth: 2 },
          { type: "file", name: "例題.zip",   date: "2026.4.14", depth: 2 }
        ] }
      ] },
      { type: "folder", name: ja ? "課題関連" : "Assignments", date: "2026.4.13", depth: 0, children: [
        { type: "file", name: "Report1_テンプレート.docx", date: "2026.4.13", depth: 1 },
        { type: "file", name: "ProblemSet4.pdf", date: "2026.4.16", depth: 1 }
      ] },
      { type: "file", name: "シラバス.pdf", date: "2026.4.1", depth: 0 }
    ];
    function appendRow(it) {
      var row = document.createElement("div");
      row.className = "res-table-row indent-" + it.depth + (it.type === "folder" ? " folder" : "");
      row.innerHTML = '<span class="ico">' + (it.type === "folder" ? '📁' : '📄') + '</span>'
        + '<span class="name"><a href="#" onclick="return false">' + escHtml(it.name) + '</a></span>'
        + '<span class="meta">' + escHtml(it.date) + '</span>';
      t.appendChild(row);
      if (it.type === "folder") {
        var childRows = [];
        it.children.forEach(function (ch) {
          var startIdx = t.children.length;
          appendRow(ch);
          var added = Array.prototype.slice.call(t.children, startIdx);
          childRows = childRows.concat(added);
        });
        row.addEventListener("click", function () {
          var hidden = childRows[0] && childRows[0].classList.contains("collapsed-children");
          childRows.forEach(function (r) { r.classList.toggle("collapsed-children", !hidden); });
        });
      } else {
        row.querySelector(".name a").addEventListener("click", function (e) { e.preventDefault(); showToast(it.name); });
      }
    }
    items.forEach(appendRow);
    body.appendChild(t);
  }

  function renderToolAssignments(body, c) {
    var ja = detectLang() === "ja";
    var courseAssigns = ASSIGNMENTS.filter(function (a) { return a.courseId === c.id; });
    if (courseAssigns.length === 0) {
      var empty = document.createElement("div");
      empty.style.cssText = "padding:24px;text-align:center;color:var(--text2)";
      empty.textContent = ja ? "この授業の課題はありません" : "No assignments for this course";
      body.appendChild(empty);
      return;
    }
    var list = document.createElement("div");
    list.className = "assign-list";
    courseAssigns.forEach(function (a) {
      var row = document.createElement("div");
      row.className = "assign-row";
      var status = "";
      if (a.status && a.status.indexOf("評定") >= 0) status = ja ? "評定済" : "Graded";
      else if (a.status && a.status.indexOf("提出") >= 0) status = ja ? "提出済" : "Submitted";
      else if (a.deadline && a.deadline < Date.now()) status = ja ? "期限切れ" : "Overdue";
      else status = ja ? "未提出" : "Not submitted";
      row.innerHTML = '<div class="assign-row-name">' + escHtml(assignName(a)) + '</div>'
        + '<div class="assign-row-meta">'
        + (a.deadline ? formatDeadline(a.deadline) + '<br>' : '')
        + '<span style="font-weight:600">' + escHtml(status) + '</span>'
        + (a.grade ? ' / ' + escHtml(a.grade) : '')
        + '</div>';
      row.addEventListener("click", function () { showToast(assignName(a)); });
      list.appendChild(row);
    });
    body.appendChild(list);
  }

  function renderToolForums(body, c) {
    var ja = detectLang() === "ja";
    var threads = [
      { author: "山田", title: ja ? "課題#2の質問について" : "Question about Assignment #2", preview: ja ? "課題の3問目で..." : "On problem 3 of the assignment...", count: 4, when: "3" + (ja ? "時間前" : "h ago") },
      { author: "佐藤", title: ja ? "次週の予習範囲" : "Reading for next week", preview: ja ? "教科書のp.45..." : "Textbook page 45...", count: 2, when: ja ? "昨日" : "Yesterday" },
      { author: "鈴木", title: ja ? "推薦参考文献" : "Recommended references", preview: ja ? "理解を深めるために..." : "For deeper understanding...", count: 7, when: "2" + (ja ? "日前" : "d ago") }
    ];
    var list = document.createElement("div");
    list.className = "forum-list";
    threads.forEach(function (t) {
      var row = document.createElement("div");
      row.className = "forum-row";
      row.innerHTML = '<div class="avatar">' + escHtml(t.author.slice(0, 1)) + '</div>'
        + '<div class="body">'
        + '<div class="title">' + escHtml(t.title) + '</div>'
        + '<div class="meta">' + escHtml(t.author) + ' · ' + escHtml(t.when) + '</div>'
        + '<div class="preview">' + escHtml(t.preview) + '</div>'
        + '</div>'
        + '<div class="count">' + t.count + '</div>';
      row.addEventListener("click", function () { showToast(t.title); });
      list.appendChild(row);
    });
    body.appendChild(list);
  }

  function renderToolGradebook(body, c) {
    var ja = detectLang() === "ja";
    var courseAssigns = ASSIGNMENTS.filter(function (a) { return a.courseId === c.id && a.grade; });
    var t = document.createElement("div");
    t.className = "grade-table";
    var hd = document.createElement("div");
    hd.className = "grade-row header";
    hd.innerHTML = '<span>' + (ja ? "課題" : "Assignment") + '</span>'
      + '<span style="text-align:center">' + (ja ? "得点" : "Score") + '</span>'
      + '<span style="text-align:center">' + (ja ? "評定" : "Grade") + '</span>';
    t.appendChild(hd);
    if (courseAssigns.length === 0) {
      var empty = document.createElement("div");
      empty.style.cssText = "padding:24px;text-align:center;color:var(--text2)";
      empty.textContent = ja ? "まだ評定された課題はありません" : "No graded assignments yet";
      t.appendChild(empty);
    } else {
      courseAssigns.forEach(function (a) {
        var letter = a.grade || "—";
        var letterCls = letter[0] || "";
        var score = letter === "A" ? "92" : letter === "B+" ? "85" : "—";
        var row = document.createElement("div");
        row.className = "grade-row";
        row.innerHTML = '<span>' + escHtml(assignName(a)) + '</span>'
          + '<span class="score">' + escHtml(score) + '</span>'
          + '<span class="grade ' + letterCls + '">' + escHtml(letter) + '</span>';
        t.appendChild(row);
      });
    }
    body.appendChild(t);
  }

  function renderToolSyllabus(body, c) {
    var ja = detectLang() === "ja";
    if (!c.hasSyllabus) {
      var empty = document.createElement("div");
      empty.style.cssText = "padding:24px;text-align:center;color:var(--text2)";
      empty.textContent = ja ? "この授業のシラバスはKULASISに登録されていません" : "Syllabus not registered in KULASIS";
      body.appendChild(empty);
      return;
    }
    var box = document.createElement("div");
    box.className = "syllabus-card";
    var dayName = ["日","月","火","水","木","金","土"][c.day];
    box.innerHTML = ''
      + syllabusRow(ja ? "授業名" : "Course", ja ? c.name : c.nameEn)
      + syllabusRow(ja ? "担当教員" : "Instructor", ja ? "京大 太郎 教授" : "Prof. Taro Kyodai")
      + syllabusRow(ja ? "開講期" : "Term", ja ? "2026年度 前期" : "AY 2026 Spring")
      + syllabusRow(ja ? "曜時限" : "Day/Period", (ja ? dayName + "曜" + c.period + "限" : ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][c.day] + " " + c.period))
      + syllabusRow(ja ? "単位" : "Credits", "2")
      + syllabusRow(ja ? "教室" : "Room", "工学部総合校舎 305")
      + '<div class="syllabus-section"><div class="syllabus-section-title">' + (ja ? "授業の目的・概要" : "Purpose / Outline") + '</div>'
      + '<div class="syllabus-section-body">' + escHtml(ja ? "本講義では" + c.name + "の基礎を学び、応用への足がかりを身につける。" : "This course covers fundamentals of " + c.nameEn + " with practical applications.") + '</div></div>'
      + '<div class="syllabus-section"><div class="syllabus-section-title">' + (ja ? "成績評価" : "Grading") + '</div>'
      + '<div class="syllabus-section-body">' + escHtml(ja ? "中間試験 30%、期末試験 50%、課題 20%。" : "Midterm 30%, Final 50%, Assignments 20%.") + '</div></div>';
    body.appendChild(box);
  }
  function syllabusRow(label, val) {
    return '<div class="syllabus-row"><span class="label">' + escHtml(label) + '</span><span class="val">' + escHtml(val) + '</span></div>';
  }

  // ============== Top-level wiring ==============
  function applyAll() {
    applySettings();
    renderTopFavbar();
    renderSidebar();
    renderMainPage();
    updateBreadcrumb();
    buildTabBar();
    renderActiveView();
  }

  document.getElementById("kulms-assign-toggle").addEventListener("click", togglePanel);
  document.getElementById("closeBtn").addEventListener("click", closePanel);
  document.getElementById("panelOverlay").addEventListener("click", closePanel);

  // Home navigation: logo block & "ホーム" breadcrumb
  var bcHome = document.getElementById("breadcrumbHome");
  if (bcHome) bcHome.addEventListener("click", function () { navigateTo({ type: "home" }); });
  var logoBlock = document.querySelector(".lms-logo-block .lms-logo");
  if (logoBlock) {
    logoBlock.style.cursor = "pointer";
    logoBlock.addEventListener("click", function () { navigateTo({ type: "home" }); });
  }
  document.getElementById("refreshBtn").addEventListener("click", function () {
    var btn = document.getElementById("refreshBtn");
    btn.classList.add("spinning");
    setTimeout(function () {
      btn.classList.remove("spinning");
      openTime = Date.now();
      renderActiveView();
      showToast(t("lastUpdatedNow"));
    }, 600);
  });
  function toggleSidebar() {
    var sb = document.getElementById("lmsSidebar");
    var arr = document.getElementById("sbArrow");
    sb.classList.toggle("open");
    arr.classList.toggle("open");
    state.sidebarOpen = sb.classList.contains("open");
    saveState();
  }
  document.getElementById("sidebarToggleBtn").addEventListener("click", toggleSidebar);
  var headerSbToggle = document.getElementById("sidebarToggleBtn2");
  if (headerSbToggle) headerSbToggle.addEventListener("click", toggleSidebar);

  // Initial render
  applyAll();
  if (state.sidebarOpen) {
    document.getElementById("lmsSidebar").classList.add("open");
    document.getElementById("sbArrow").classList.add("open");
  }

  // First-run only: auto-open the KULMS+ panel after 1.5s so reviewers can see it
  // After first run, respect the user's last open/close choice
  if (!localStorage.getItem("kulms-demo-seen-panel")) {
    setTimeout(function () {
      if (!panelEl.classList.contains("open")) openPanel();
      localStorage.setItem("kulms-demo-seen-panel", "1");
    }, 1500);
  } else if (state.panelOpen) {
    setTimeout(function () { openPanel(); }, 200);
  }
})();
</script>
</body>
</html>

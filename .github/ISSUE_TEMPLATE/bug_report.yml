name: Bug Report
description: バグの報告
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: バグの内容
      description: 何が起きたかを具体的に教えてください。
      placeholder: "例: ログイン後に画面が真っ白になる"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どう動くべきかを教えてください。
      placeholder: "例: LMSのポータル画面が表示される"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現する手順を教えてください。
      placeholder: |
        1. アプリを起動
        2. ログインする
        3. 画面を確認
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: デバイス / iOS バージョン
      placeholder: "例: iPhone 15 / iOS 18.0"
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: その他
      description: スクリーンショットやログなど、参考になる情報があれば添付してください。
    validations:
      required: false

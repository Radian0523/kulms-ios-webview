name: KULMS
options:
  bundleIdPrefix: com.radian0523
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  knownRegions:
    - Base
    - en
    - ja

targets:
  KULMS:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.xcodeproj"
          - "*.xcworkspace"
          - "ExtensionFiles"
          - "build"
          - ".git"
          - ".github"
          - "docs"
          - "screenshots"
          - "*.md"
          - "LICENSE"
      # 拡張機能の JS ファイル（src/ 内）
      - path: ../kulms-extension/src/settings.js
        buildPhase: resources
      - path: ../kulms-extension/src/assignments.js
        buildPhase: resources
      - path: ../kulms-extension/src/submit-detect.js
        buildPhase: resources
      - path: ../kulms-extension/src/tree-view.js
        buildPhase: resources
      - path: ../kulms-extension/src/course-name.js
        buildPhase: resources
      - path: ../kulms-extension/src/course-click.js
        buildPhase: resources
      - path: ../kulms-extension/src/tool-visibility.js
        buildPhase: resources
      - path: WebResources/kulms-textbook-handler.js
        buildPhase: resources
      - path: ../kulms-extension/src/textbooks.js
        buildPhase: resources
      - path: ../kulms-extension/src/sidebar-resize.js
        buildPhase: resources
      - path: ../kulms-extension/src/top-favbar.js
        buildPhase: resources
      # 拡張機能の CSS
      - path: ../kulms-extension/styles.css
        buildPhase: resources
      # 拡張機能のロケールファイル
      - path: ../kulms-extension/_locales
        buildPhase: resources
        type: folder
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        PRODUCT_BUNDLE_IDENTIFIER: com.radian0523.kulms-plus-for-ios
        PRODUCT_NAME: KULMS
        INFOPLIST_KEY_CFBundleDisplayName: "KULMS+"
        MARKETING_VERSION: "2.3.0"
        CURRENT_PROJECT_VERSION: "12"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
